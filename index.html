<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CashFaster | النظام الذهبي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0f1e; color: #eef5ff; direction: rtl; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: rgba(10,20,30,0.8); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #D4AF37; }
        .btn-gold { background: #D4AF37; border: none; padding: 12px; border-radius: 40px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #D4AF37; background: #0a0a0a; color: white; }
        .timer { font-size: 2rem; font-family: monospace; color: #FFB347; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="loginPage" class="container">
    <div class="card" style="text-align:center">
        <h1 style="color:#D4AF37">💰 CashFaster</h1>
        <p>النظام الذهبي للتمويل الرقمي</p>
        <input type="text" id="nationalId" placeholder="الرقم القومي (14 رقم)" maxlength="14">
        <button class="btn-gold" onclick="checkUser()">دخول</button>
        <div id="loginError" style="color:red; margin-top:10px"></div>
    </div>
</div>
<div id="dashboardPage" class="container hidden">
    <div class="card">
        <h2 id="customerName">...</h2>
        <p id="loanAmount"></p>
        <p id="walletInfo"></p>
        <div id="timerBox" class="timer">30:00</div>
        <button class="btn-gold" onclick="window.open('https://survey.porsline.com/s/79e42DKa','_blank')">رفع الصور عبر الرابط الآمن</button>
        <button class="btn-gold" onclick="logout()" style="margin-top:10px">تسجيل خروج</button>
    </div>
</div>
<script>
    let currentCustomer = null;
    let timerInterval = null;

    async function checkUser() {
        const id = document.getElementById('nationalId').value.trim();
        if (!id || id.length !== 14) {
            document.getElementById('loginError').innerText = 'أدخل 14 رقم صحيح';
            return;
        }
        const res = await fetch('customers.json');
        const customers = await res.json();
        const customer = customers.find(c => c.id === id);
        if (!customer) {
            document.getElementById('loginError').innerText = 'رقم غير مسجل';
            return;
        }
        currentCustomer = customer;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        document.getElementById('customerName').innerText = customer.name;
        document.getElementById('loanAmount').innerHTML = `💰 مبلغ التمويل: ${customer.loan.toLocaleString()} ج.م`;
        document.getElementById('walletInfo').innerHTML = `📱 المحفظة: ${customer.type}<br>📞 رقمها: ${customer.wallet.slice(0,3)}****${customer.wallet.slice(-3)}`;
        startTimer();
    }

    function startTimer() {
        let timeLeft = 30 * 60;
        const timerElem = document.getElementById('timerBox');
        timerInterval = setInterval(() => {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerElem.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (timeLeft <= 0) clearInterval(timerInterval);
            timeLeft--;
        }, 1000);
    }

    function logout() {
        clearInterval(timerInterval);
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('nationalId').value = '';
    }
</script>
</body>
</html>
